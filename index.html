<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Mentor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      background: #000;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 3rem;
    }

    h1 {
      color: #fff;
      font-family: sans-serif;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    /* ── Tool grid ─────────────────────────────────────────── */
    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 720px;
    }

    .tool-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 1rem;
      border: 1px solid #1e1e1e;
      border-radius: 3px;
      text-decoration: none;
      color: #888;
      font-family: sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .tool-link:hover {
      border-color: #555;
      color: #fff;
    }

    .tool-link:hover .camera-icon {
      stroke: #fff;
    }

    .camera-icon {
      width: 48px;
      height: 32px;
      stroke: #555;
      transition: stroke 0.2s;
    }
  </style>
</head>
<body>

  <h1>Photo Mentor</h1>

  <nav class="tools">

    <a class="tool-link" href="/photo-mentor/exposure-triangle/">
      <svg class="camera-icon" viewBox="0 0 48 32" fill="none"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="10" width="44" height="20" rx="2.5"/>
        <circle cx="18" cy="20" r="7.5"/>
        <circle cx="18" cy="20" r="4"/>
        <rect x="29" y="6" width="13" height="6" rx="1.5"/>
        <circle cx="10" cy="8.5" r="2"/>
      </svg>
      Exposure Triangle
    </a>

    <a class="tool-link" href="/photo-mentor/campfire/">
      <svg class="camera-icon" viewBox="0 0 48 32" fill="none"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M24 28 C16 28 12 22 14 16 C15 12 18 10 18 10 C17 14 20 15 20 12 C21 9 24 6 24 6 C24 6 27 9 28 12 C28 15 31 14 30 10 C30 10 33 12 34 16 C36 22 32 28 24 28Z"/>
        <line x1="14" y1="29" x2="34" y2="26"/>
        <line x1="14" y1="26" x2="34" y2="29"/>
      </svg>
      Campfire Metaphor
    </a>

    <a class="tool-link" href="/photo-mentor/faucet/">
      <svg class="camera-icon" viewBox="0 0 48 32" fill="none"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Pipe -->
        <rect x="20" y="2" width="8" height="16" rx="2"/>
        <!-- Nozzle -->
        <rect x="17" y="16" width="14" height="5" rx="1.5"/>
        <!-- Handle -->
        <rect x="22" y="0" width="4" height="8" rx="1"/>
        <rect x="16" y="1" width="16" height="4" rx="1.5"/>
        <!-- Bucket -->
        <path d="M10 23 L13 30 L35 30 L38 23Z"/>
        <line x1="9" y1="23" x2="39" y2="23"/>
        <!-- Water line -->
        <line x1="14" y1="27" x2="34" y2="27" stroke-dasharray="2 2"/>
      </svg>
      Faucet Metaphor
    </a>

  </nav>

</body>
</html>
