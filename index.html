<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Mentor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      background: #000;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 3rem;
    }

    h1 {
      color: #fff;
      font-family: sans-serif;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    /* ── Tool grid ─────────────────────────────────────────── */
    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 720px;
    }

    .tool-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 1rem;
      border: 1px solid #1e1e1e;
      border-radius: 3px;
      text-decoration: none;
      color: #888;
      font-family: sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .tool-link:hover {
      border-color: #555;
      color: #fff;
    }

    .tool-link:hover .camera-icon {
      stroke: #fff;
    }

    .camera-icon {
      width: 48px;
      height: 32px;
      stroke: #555;
      transition: stroke 0.2s;
    }
  </style>
</head>
<body>

  <h1>Photo Mentor</h1>

  <nav class="tools">

    <a class="tool-link" href="/photo-mentor/exposure-triangle/">
      <!-- Rangefinder-style camera icon -->
      <svg class="camera-icon" viewBox="0 0 48 32" fill="none"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Body -->
        <rect x="2" y="10" width="44" height="20" rx="2.5"/>
        <!-- Lens barrel -->
        <circle cx="18" cy="20" r="7.5"/>
        <!-- Inner lens ring -->
        <circle cx="18" cy="20" r="4"/>
        <!-- Viewfinder -->
        <rect x="29" y="6" width="13" height="6" rx="1.5"/>
        <!-- Shutter button -->
        <circle cx="10" cy="8.5" r="2"/>
      </svg>
      Exposure Triangle
    </a>

  </nav>

</body>
</html>
