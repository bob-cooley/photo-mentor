<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campfire — Photo Mentor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background: #111;
      color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .back-link {
      color: #888;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }
    .back-link:hover { color: #ddd; }
    .breadcrumb-sep { color: #666; }

    header h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bbb;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1rem 2rem;
    }

    /* Scene */
    .scene-wrapper {
      width: 100%;
      background: #000;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    #scene {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Warmth meter */
    .meter-section { margin-bottom: 1.25rem; }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #983333;
      margin-bottom: 0.6rem;
    }

    .meter {
      position: relative;
      height: 28px;
      display: flex;
      align-items: center;
    }

    .meter-track {
      position: relative;
      width: 100%;
      height: 4px;
      background: #222;
      border-radius: 2px;
    }

    .meter-fill {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 2px;
      transition: left 0.2s, width 0.2s, background-color 0.2s;
    }

    .meter-center-tick {
      position: absolute;
      top: -6px;
      left: 50%;
      width: 1px;
      height: 16px;
      background: #3a3a3a;
      transform: translateX(-50%);
    }

    .meter-needle {
      position: absolute;
      top: -8px;
      width: 3px;
      height: 20px;
      background: #fff;
      border-radius: 1.5px;
      transform: translateX(-50%);
      transition: left 0.2s;
    }

    .meter-tick-row {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      margin-top: 6px;
    }

    .meter-tick-row span {
      font-size: 0.8rem;
      color: #555;
      text-align: center;
    }

    .meter-readout {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-top: 0.6rem;
    }

    .warmth-value {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .warmth-desc {
      font-size: 0.95rem;
      color: #aaa;
    }

    /* Controls */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px solid #1e1e1e;
    }

    .mode-toggle { display: flex; }

    .mode-btn {
      padding: 0.35rem 0.9rem;
      background: transparent;
      border: 1px solid #444;
      color: #999;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .mode-btn:first-child { border-radius: 2px 0 0 2px; }
    .mode-btn:last-child  { border-radius: 0 2px 2px 0; border-left: none; }
    .mode-btn.active { background: #2a2a2a; color: #eee; border-color: #983333; }
    .mode-btn:last-child.active { border-left: 1px solid #983333; }

    .reset-btn {
      padding: 0.35rem 1rem;
      background: transparent;
      border: 1px solid #444;
      color: #999;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-btn:hover { border-color: #999; color: #eee; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
      user-select: none;
      -webkit-user-select: none;
    }

    .control { display: flex; flex-direction: column; gap: 0.4rem; }

    .control-metaphor {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #983333;
    }

    .control-photo {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #444;
    }

    .control-value {
      font-size: 2rem;
      font-weight: 300;
      color: #fff;
      line-height: 1;
    }

    .control-photo-value {
      font-size: 0.78rem;
      color: #555;
    }

    .control-delta { font-size: 0.85rem; color: #aaa; min-height: 1em; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #2e2e2e;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      margin: 0.3rem 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.25); }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px;
      background: #fff; border-radius: 50%; border: none; cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <a class="back-link" href="/photo-mentor/">Photo Mentor</a>
  <span class="breadcrumb-sep">/</span>
  <h1>Exposure Triangle — Campfire</h1>
</header>

<main>

  <!-- Scene canvas -->
  <div class="scene-wrapper">
    <canvas id="scene" width="900" height="480"></canvas>
  </div>

  <!-- Warmth meter -->
  <div class="meter-section">
    <div class="section-label">Warmth Received</div>
    <div class="meter">
      <div class="meter-track">
        <div class="meter-fill" id="meterFill"></div>
        <div class="meter-center-tick"></div>
        <div class="meter-needle" id="meterNeedle"></div>
      </div>
    </div>
    <div class="meter-tick-row">
      <span>−4</span><span>−3</span><span>−2</span><span>−1</span>
      <span>0</span>
      <span>+1</span><span>+2</span><span>+3</span><span>+4</span>
    </div>
    <div class="meter-readout">
      <span class="warmth-value" id="warmthValue">0.0 EV</span>
      <span class="warmth-desc" id="warmthDesc">Just right</span>
    </div>
  </div>

  <!-- Film / Digital + Reset -->
  <div class="controls-row">
    <div class="mode-toggle">
      <button class="mode-btn" id="filmBtn">Film</button>
      <button class="mode-btn active" id="digitalBtn">Digital</button>
    </div>
    <button class="reset-btn" id="resetBtn">Reset to Reference</button>
  </div>

  <!-- Controls -->
  <div class="controls">

    <div class="control">
      <div class="control-metaphor">Fire Size</div>
      <div class="control-photo">Aperture</div>
      <div class="control-value" id="fireVal">f/5.6</div>
      <div class="control-delta" id="fireDelta">Reference</div>
      <input type="range" id="aSlider" min="0" max="8" step="1" value="4">
    </div>

    <div class="control">
      <div class="control-metaphor">Time at Fire</div>
      <div class="control-photo">Shutter Speed</div>
      <div class="control-value" id="timeVal">1/125</div>
      <div class="control-delta" id="timeDelta">Reference</div>
      <input type="range" id="sSlider" min="0" max="12" step="1" value="4">
    </div>

    <div class="control">
      <div class="control-metaphor">Distance</div>
      <div class="control-photo" id="sensitivityLabel">ISO</div>
      <div class="control-value" id="distVal">400</div>
      <div class="control-delta" id="distDelta">Reference</div>
      <input type="range" id="iSlider" min="0" max="7" step="1" value="2">
    </div>

  </div>

</main>

<script>
  const APERTURES      = ['f/1.4','f/2','f/2.8','f/4','f/5.6','f/8','f/11','f/16','f/22'];
  const SHUTTERS       = ['1/2000','1/1000','1/500','1/250','1/125','1/60','1/30','1/15','1/8','1/4','1/2','1″','2″'];
  const SHUTTER_SECS   = [1/2000,1/1000,1/500,1/250,1/125,1/60,1/30,1/15,1/8,1/4,1/2,1,2];

  const SENSITIVITY = {
    digital: { label: 'ISO', values: ['100','200','400','800','1600','3200','6400','12800'], ref: 2 },
    film:    { label: 'ASA', values: ['25','50','100','200','400','800','1600','3200'],    ref: 4 }
  };

  const REF_A = 4, REF_S = 4;
  let mode = 'digital';

  const canvas = document.getElementById('scene');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Flicker state
  let flickerOffset = 0;
  let lastFlicker = 0;

  function lerp(v, a, b, c, d) {
    return c + (d - c) * Math.max(0, Math.min(1, (v - a) / (b - a)));
  }

  function drawScene(aI, sI, iI, totalEV) {
    ctx.clearRect(0, 0, W, H);

    const groundY = H * 0.70;

    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, groundY);
    sky.addColorStop(0, '#03030a');
    sky.addColorStop(1, '#07070f');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, groundY);

    // Ground
    ctx.fillStyle = '#060604';
    ctx.fillRect(0, groundY, W, H - groundY);

    // Ground line
    ctx.strokeStyle = '#0f0e0a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();

    // Fire position — left of center
    const fireX = W * 0.32;
    const fireY = groundY;

    // Fire radius: f/1.4 (0) = big, f/22 (8) = small
    const fireR  = lerp(aI, 0, 8, 72, 8);
    // Light spread proportional to fire size
    const spread = lerp(aI, 0, 8, 420, 55);

    // Perceived brightness from EV: clamp to reasonable range
    const evBright = Math.max(0.04, Math.min(5, Math.pow(2, totalEV)));

    // Flicker: subtle random variation
    const now = performance.now();
    if (now - lastFlicker > 80) {
      flickerOffset = (Math.random() - 0.5) * 0.06;
      lastFlicker = now;
    }
    const flickeredBright = evBright * (1 + flickerOffset);

    // ── Light pool ───────────────────────────────────────────────────
    const lightAlpha = Math.min(0.9, 0.55 * Math.sqrt(flickeredBright));
    const grd = ctx.createRadialGradient(fireX, fireY, fireR * 0.3, fireX, fireY, spread);
    grd.addColorStop(0,   `rgba(255, 185, 60, ${lightAlpha})`);
    grd.addColorStop(0.25,`rgba(255, 130, 30, ${lightAlpha * 0.65})`);
    grd.addColorStop(0.6, `rgba(220, 80,  10, ${lightAlpha * 0.22})`);
    grd.addColorStop(1,   'rgba(0, 0, 0, 0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Ground warm tint from fire
    const groundGrd = ctx.createRadialGradient(fireX, fireY, 0, fireX, fireY, spread * 0.8);
    groundGrd.addColorStop(0,   `rgba(180, 100, 20, ${lightAlpha * 0.4})`);
    groundGrd.addColorStop(0.5, `rgba(120,  60,  10, ${lightAlpha * 0.15})`);
    groundGrd.addColorStop(1,   'rgba(0, 0, 0, 0)');
    ctx.fillStyle = groundGrd;
    ctx.fillRect(0, groundY, W, H - groundY);

    // ── Logs ─────────────────────────────────────────────────────────
    ctx.lineCap = 'round';
    ctx.lineWidth = Math.max(4, fireR * 0.22);
    ctx.strokeStyle = '#1a0f06';
    ctx.beginPath();
    ctx.moveTo(fireX - fireR * 1.3, fireY + 2);
    ctx.lineTo(fireX + fireR * 0.8, fireY - fireR * 0.25);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(fireX + fireR * 1.3, fireY + 2);
    ctx.lineTo(fireX - fireR * 0.8, fireY - fireR * 0.25);
    ctx.stroke();

    // ── Embers glow on ground ────────────────────────────────────────
    const emberGrd = ctx.createRadialGradient(fireX, fireY + 3, 0, fireX, fireY + 3, fireR * 0.9);
    emberGrd.addColorStop(0,   `rgba(255, 120, 0, ${lightAlpha * 0.6})`);
    emberGrd.addColorStop(0.6, `rgba(200, 60, 0, ${lightAlpha * 0.2})`);
    emberGrd.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = emberGrd;
    ctx.fillRect(fireX - fireR, fireY, fireR * 2, 12);

    // ── Fire flame ───────────────────────────────────────────────────
    const fk = 1 + flickerOffset * 0.5;
    const flameGrd = ctx.createRadialGradient(
      fireX, fireY - fireR * 0.6 * fk, fireR * 0.05,
      fireX, fireY - fireR * 0.2,       fireR * 1.6 * fk
    );
    flameGrd.addColorStop(0,   'rgba(255, 255, 210, 0.95)');
    flameGrd.addColorStop(0.15,'rgba(255, 220, 80,  0.88)');
    flameGrd.addColorStop(0.4, 'rgba(255, 120, 10,  0.7)');
    flameGrd.addColorStop(0.75,'rgba(220, 50,  0,   0.35)');
    flameGrd.addColorStop(1,   'rgba(180, 20,  0,   0)');
    ctx.fillStyle = flameGrd;
    ctx.beginPath();
    ctx.ellipse(fireX, fireY - fireR * 0.5 * fk, fireR * 1.1, fireR * 1.7 * fk, 0, 0, Math.PI * 2);
    ctx.fill();

    // ── Figure ───────────────────────────────────────────────────────
    const cfg   = SENSITIVITY[mode];
    const maxI  = cfg.values.length - 1;
    // Close (high ISO) = near fire, far (low ISO) = far right
    const figX  = lerp(iI, 0, maxI, W * 0.82, fireX + spread * 0.38);
    const figGroundY = groundY;

    drawFigure(figX, figGroundY, flickeredBright, fireX, spread);
  }

  function drawFigure(x, groundY, brightness, fireX, spread) {
    const headR  = 14;
    const bodyH  = 52;
    const bodyW  = 16;
    const legH   = 28;
    const headCY = groundY - legH - bodyH - headR;

    // Warmth on figure: how much light reaches this x position
    const dist      = x - fireX;
    const rawLight  = Math.max(0, 1 - dist / spread);
    const warmth    = rawLight * brightness;
    const litAlpha  = Math.min(0.9, warmth * 0.85);

    // ── Silhouette ───────────────────────────────────────────────────
    ctx.fillStyle = '#080808';

    // Head
    ctx.beginPath();
    ctx.arc(x, headCY, headR, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.roundRect(x - bodyW / 2, groundY - legH - bodyH, bodyW, bodyH, 2);
    ctx.fill();

    // Legs
    ctx.fillRect(x - bodyW / 2, groundY - legH, bodyW * 0.42, legH);
    ctx.fillRect(x + bodyW * 0.08, groundY - legH, bodyW * 0.42, legH);

    // ── Warm light overlay on fire-facing side ───────────────────────
    if (litAlpha > 0.02) {
      // Gradient facing the fire (left side of figure)
      const faceDir = (fireX < x) ? -1 : 1; // fire is to the left
      const litGrd = ctx.createLinearGradient(
        x + faceDir * bodyW, headCY,
        x - faceDir * bodyW * 0.5, headCY
      );
      litGrd.addColorStop(0, `rgba(255, 160, 50, ${litAlpha})`);
      litGrd.addColorStop(1, 'rgba(255, 140, 40, 0)');

      ctx.fillStyle = litGrd;
      ctx.beginPath();
      ctx.arc(x, headCY, headR, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = litGrd;
      ctx.beginPath();
      ctx.roundRect(x - bodyW / 2, groundY - legH - bodyH, bodyW, bodyH, 2);
      ctx.fill();

      ctx.fillRect(x - bodyW / 2, groundY - legH, bodyW * 0.42, legH);
      ctx.fillRect(x + bodyW * 0.08, groundY - legH, bodyW * 0.42, legH);
    }
  }

  // ── Exposure math ─────────────────────────────────────────────────
  function deltaLabel(stops) {
    if (stops === 0) return 'Reference';
    const n    = Math.abs(stops);
    const word = n === 1 ? 'stop' : 'stops';
    const dir  = stops > 0 ? 'more light' : 'less light';
    return `${stops > 0 ? '+' : ''}${stops} ${word} — ${dir}`;
  }

  function warmthDescription(ev) {
    if (Math.abs(ev) < 0.5) return 'Just right';
    if (ev <= -3) return 'Far too cold';
    if (ev <= -2) return 'Too cold';
    if (ev <   0) return 'A little cold';
    if (ev >=  3) return 'Way too hot';
    if (ev >=  2) return 'Too hot';
    return 'A little too warm';
  }

  function evColor(ev) {
    if (Math.abs(ev) < 0.5) return '#fff';
    return ev < 0 ? '#6ab8f7' : '#f7963a';
  }

  function fillColor(ev) {
    if (Math.abs(ev) <= 1) return '#983333';
    return ev < 0 ? '#5aacf5' : '#f5812a';
  }

  // ── Main update ───────────────────────────────────────────────────
  function update() {
    const cfg    = SENSITIVITY[mode];
    const aI     = +document.getElementById('aSlider').value;
    const sI     = +document.getElementById('sSlider').value;
    const iI     = +document.getElementById('iSlider').value;

    const aDelta = REF_A - aI;
    const sDelta = sI - REF_S;
    const iDelta = iI - cfg.ref;
    const totalEV = aDelta + sDelta + iDelta;

    // Control display
    document.getElementById('fireVal').textContent  = APERTURES[aI];
    document.getElementById('timeVal').textContent  = SHUTTERS[sI];
    document.getElementById('distVal').textContent  = cfg.values[iI];
    document.getElementById('fireDelta').textContent  = deltaLabel(aDelta);
    document.getElementById('timeDelta').textContent  = deltaLabel(sDelta);
    document.getElementById('distDelta').textContent  = deltaLabel(iDelta);

    // Meter
    const clamped = Math.max(-4, Math.min(4, totalEV));
    const pct     = (clamped + 4) / 8 * 100;
    document.getElementById('meterNeedle').style.left = `${pct}%`;

    const fill   = document.getElementById('meterFill');
    const center = 50;
    if (pct >= center) {
      fill.style.left  = `${center}%`;
      fill.style.width = `${pct - center}%`;
    } else {
      fill.style.left  = `${pct}%`;
      fill.style.width = `${center - pct}%`;
    }
    fill.style.backgroundColor = fillColor(totalEV);

    const sign = totalEV > 0 ? '+' : '';
    const wv   = document.getElementById('warmthValue');
    wv.textContent  = `${sign}${totalEV.toFixed(1)} EV`;
    wv.style.color  = evColor(totalEV);
    document.getElementById('warmthDesc').textContent = warmthDescription(totalEV);

    drawScene(aI, sI, iI, totalEV);
  }

  // ── Animation loop (for flicker) ──────────────────────────────────
  function tick() {
    update();
    requestAnimationFrame(tick);
  }

  // ── Mode ──────────────────────────────────────────────────────────
  function setMode(newMode) {
    mode = newMode;
    const cfg = SENSITIVITY[mode];
    document.getElementById('filmBtn').classList.toggle('active', mode === 'film');
    document.getElementById('digitalBtn').classList.toggle('active', mode === 'digital');
    document.getElementById('sensitivityLabel').textContent = cfg.label;
    document.getElementById('iSlider').value = cfg.ref;
    update();
  }

  // ── Events ────────────────────────────────────────────────────────
  document.getElementById('filmBtn').addEventListener('click',    () => setMode('film'));
  document.getElementById('digitalBtn').addEventListener('click', () => setMode('digital'));

  ['aSlider','sSlider','iSlider'].forEach(id => {
    document.getElementById(id).addEventListener('input', update);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('aSlider').value = REF_A;
    document.getElementById('sSlider').value = REF_S;
    document.getElementById('iSlider').value = SENSITIVITY[mode].ref;
    update();
  });

  tick();
</script>

</body>
</html>
